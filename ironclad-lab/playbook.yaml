---
- name: IronClad Security Framework - Execution
  hosts: windows
  become: false
  gather_facts: yes

  vars_files:
    - /vars/main.yml

  tasks:
    - name: Fase 1 - Auditoría de cumplimiento
      include_role:
        name: audit
      when: not (skip_audit | default(false) | bool)

    - name: Fase 2 - Hardening del sistema
      include_role:
        name: hardening
      when: not (skip_hardening | default(false) | bool)

    - name: Fase 3 - Verificación de cumplimiento
      include_role:
        name: compliance
      when: not (skip_compliance | default(false) | bool)
