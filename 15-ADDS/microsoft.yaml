---
- name: Crear OUs por departamento y usuarios en Active Directory
  hosts: windows
  gather_facts: false

  vars:
    domain_dn: "DC=vzpaD,DC=info"

    # OU raíz para departamentos
    base_ou: "OU=Departamentos,{{ domain_dn }}"

    default_password: "P@ssw0rd123!"

    ad_users:
      - username: jperez
        firstname: Juan
        lastname: Pérez
        email: jperez@example.com
        department: IT
        title: Desarrollador

      - username: mgarcia
        firstname: María
        lastname: García
        email: mgarcia@example.com
        department: RecursosHumanos
        title: Gerente de RRHH

      - username: clopez
        firstname: Carlos
        lastname: López
        email: clopez@example.com
        department: Ventas
        title: Ejecutivo de Ventas

  tasks:

    # 1️⃣ Crear OU raíz "Departamentos"
    - name: Crear OU raíz Departamentos si no existe
      microsoft.ad.ou:
        name: "Departamentos"
        path: "{{ domain_dn }}"
        state: present

    # 2️⃣ Crear OUs por departamento (únicos)
    - name: Crear OUs por departamento
      microsoft.ad.ou:
        name: "{{ item }}"
        path: "{{ base_ou }}"
        state: present
      loop: "{{ ad_users | map(attribute='department') | unique | list }}"

    # 3️⃣ Crear usuarios en su OU correspondiente
    - name: Crear usuarios en Active Directory
      microsoft.ad.user:
        name: "{{ item.username }}"
        firstname: "{{ item.firstname }}"
        surname: "{{ item.lastname }}"
        password: "{{ default_password }}"
        state: present
        path: "OU={{ item.department }},{{ base_ou }}"
        upn: "{{ item.email }}"
        email: "{{ item.email }}"
        company: "Mi Empresa"
        department: "{{ item.department }}"
        title: "{{ item.title | default(omit) }}"
        password_never_expires: false
        user_cannot_change_password: false
        change_password_at_logon: true
        enabled: true
        description: "Creado automáticamente por Ansible"
      loop: "{{ ad_users }}"
      loop_control:
        label: "{{ item.username }}"
