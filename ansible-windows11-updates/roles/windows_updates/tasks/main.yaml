# Rol para aplicar todas las actualizaciones de Windows Update
# Incluye controladores, acumulativas, seguridad y opcionales

- block:
    - name: Instalar todas las actualizaciones disponibles
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
          - UpdateRollups
          - FeaturePacks
          - ServicePacks
          - Drivers
          - DefinitionUpdates
          - Updates
        reboot: yes
        log_path: "{{ log_path }}win_updates.log"
      register: win_updates_result

    - name: Registrar resultado en archivo
      ansible.windows.win_shell: |
        Add-Content -Path "{{ report_file }}" -Value "Windows Updates instaladas: {{ win_updates_result.updates | default([]) }}"
        Add-Content -Path "{{ report_file }}" -Value "Reinicio requerido: {{ win_updates_result.reboot_required }}"
  rescue:
    - name: Registrar error en reporte
      ansible.windows.win_shell: |
        Add-Content -Path "{{ report_file }}" -Value "Error en Windows Update: {{ ansible_failed_result }}"
  always:
    - name: Confirmar finalización de rol Windows Updates
      ansible.windows.win_shell: |
        Add-Content -Path "{{ report_file }}" -Value "Finalizó rol Windows Updates"
