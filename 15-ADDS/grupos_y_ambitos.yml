---
- name: Laboratorio de Active Directory Grupos y ambitos
  hosts: windows
  gather_facts: no
  vars:
    target_ou: "OU=IT,OU=Departamentos,DC=vzpaD,DC=info"
    target_group: "APPS_IT"


  tasks:
    
    - name: Crear un grupo para la OU de Ventas
      microsoft.ad.group:
        name: Impresora_ventas
        category: security
        scope: local
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Crear un grupo para la OU de Ventas
      microsoft.ad.group:
        name: APPS_ventas
        category: security
        scope: global
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Crear un grupo para la OU de RRHH
      microsoft.ad.group:
        name: Impresora_RRHH
        category: security
        scope: local
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Crear un grupo para la OU de RRHH
      microsoft.ad.group:
        name: APPS_RHH
        category: security
        scope: global
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Crear un grupo para la OU de IT 
      microsoft.ad.group:
        name: Impresora_IT
        category: security
        scope: local
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Crear un grupo para la OU de IT
      microsoft.ad.group:
        name: APPS_IT
        category: security
        scope: global
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Crear un grupo para la OU de IT
      microsoft.ad.group:
        name: EmpleadosInternos_VZPADINFO
        category: security
        scope: universal
        path: OU=groups,DC=vzpaD,DC=info
        state: present

    - name: Grupo de distribucción para correos de IT
      microsoft.ad.group:
          name: HelpDesk_IT
          scope: global
          category: distribution
          attributes:
            set:
              mail: helpdesk@vzpaD.info
          protect_from_deletion: true

    - name: Obtener usuarios de una OU de IT
      ansible.windows.win_powershell:
        script: |
          Import-Module ActiveDirectory
          Get-ADUser -SearchBase "{{ target_ou }}" -Filter * |
          Select-Object -ExpandProperty SamAccountName
      register: ou_users

    - name: Agregar usuarios de la OU al grupo AD
      community.windows.win_domain_group_membership:
        name: "{{ target_group }}"
        members: "{{ ou_users.output }}"
        state: present
