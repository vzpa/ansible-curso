- block:
    - name: Crear carpeta de logs si no existe
      ansible.windows.win_shell: |
        if (-Not (Test-Path "{{ log_path }}")) {
          New-Item -ItemType Directory -Path "{{ log_path }}"
        }

    - name: Actualizar aplicaciones definidas en vars.yaml
      ansible.windows.win_shell: |
        $apps = "{{ winget_apps | join(',') }}".Split(',')
        foreach ($app in $apps) {
          try {
            winget upgrade --id $app --silent --accept-source-agreements --accept-package-agreements
            Add-Content -Path "{{ report_file }}" -Value "Aplicación actualizada: $app"
          } catch {
            Add-Content -Path "{{ report_file }}" -Value "Error al actualizar: $app"
          }
        }

    - name: Detectar y actualizar aplicaciones adicionales soportadas por Winget
      ansible.windows.win_shell: |
        $apps = winget upgrade
        foreach ($line in $apps) {
          if ($line -match "^\S+") {
            $pkg = $line.Split()[0]
            winget upgrade --id $pkg --silent --accept-source-agreements --accept-package-agreements
            Add-Content -Path "{{ report_file }}" -Value "Aplicación adicional actualizada: $pkg"
          }
        }
  rescue:
    - name: Registrar error en reporte
      ansible.windows.win_shell: |
        Add-Content -Path "{{ report_file }}" -Value "Error en Winget Updates"
  always:
    - name: Confirmar finalización de rol Winget Updates
      ansible.windows.win_shell: |
        Add-Content -Path "{{ report_file }}" -Value "Finalizó rol Winget Updates"
